services:
  - type: web
    name: abgp-portal
    env: static
    # Set in Render Dashboard → Environment (required before build):
    # VITE_API_URL = your public backend URL (not localhost)
    # VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

